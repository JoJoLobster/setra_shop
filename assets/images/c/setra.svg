<?xml version="1.0" encoding="UTF-8"?>
<svg width="160" height="40" viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 紫色渐变 - 匹配原logo色调 -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8673c2"/>
      <stop offset="100%" style="stop-color:#6352a3"/>
    </linearGradient>
  </defs>
  
  <!-- 左侧S形图形 -->
  <g transform="translate(4, 2)">
    <!-- 上方菱形 - 左右扁平 (顶16,0 右22,8 底16,16 左10,8) -->
    <polygon points="16,0 22,8 16,16 10,8" fill="url(#purpleGradient)"/>
    
    <!-- 上方菱形左下边中点: (10+16)/2,(8+16)/2 = (13, 12) -->
    <!-- 下方菱形右上边中点: (8+14)/2,(20+28)/2 = (11, 24) -->
    
    <!-- 完整S形连线 - 更细 -->
    <path d="M13,12 
             C5,14 5,20 11,22 
             C17,24 17,28 11,24" 
          fill="none" 
          stroke="url(#purpleGradient)" 
          stroke-width="0.8"
          stroke-linecap="round"/>
    
    <!-- 上方连接点 - 上方菱形左下边中点 -->
    <circle cx="13" cy="12" r="1.2" fill="url(#purpleGradient)"/>
    
    <!-- 下方连接点 - 下方菱形右上边中点 -->
    <circle cx="11" cy="24" r="1.2" fill="url(#purpleGradient)"/>
    
    <!-- 下方菱形 - 左右扁平 (顶8,20 右14,28 底8,36 左2,28) -->
    <polygon points="8,20 14,28 8,36 2,28" fill="url(#purpleGradient)"/>
  </g>
  
  <!-- SETRA 英文文字 - 深蓝色 -->
  <text x="40" y="26" 
        font-family="Arial Black, Arial, Helvetica, sans-serif" 
        font-size="18" 
        font-weight="bold" 
        letter-spacing="0.5"
        fill="#1e2d52">SETRA</text>
  
  <!-- 西特 中文文字 - 深蓝色 -->
  <text x="115" y="26" 
        font-family="Microsoft YaHei, PingFang SC, SimHei, sans-serif" 
        font-size="16" 
        font-weight="500"
        fill="#1e2d52">西特</text>
</svg>
