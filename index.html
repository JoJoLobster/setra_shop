<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>深圳市西特新环保材料有限公司 · 专业电镀添加剂研发与生产</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=20260622170114">
</head>

<body>
  <!-- 首页 Hero -->
  <section id="carousel-section">
    <div id="carousel">
      <div class="hero-text">
        <div class="eyebrow" data-i18n="heroEyebrow.index"></div>
        <h1 id="hero-title" data-i18n="heroTitle.index"></h1>
        <p class="subtitle" data-i18n="heroSubtitle.index"></p>
        <div class="hero-actions">
          <a href="products.html" class="btn btn-primary" data-i18n="heroCtaProducts"></a>
          <a href="contact.html" class="btn btn-outline" data-i18n="contactTitle"></a>
        </div>
        <div class="hero-dots" id="hero-dots"></div>
      </div>
      <div class="hero-image-stack" id="hero-image-stack">
        <!-- 由 JS 注入 -->
      </div>
    </div>
  </section>

  <main>
    <!-- 关于 -->
    <section class="section section-alt">
      <div class="section-inner">
        <div class="about-grid">
          <div class="about-image">
            <img src="assets/images/home/bg-4.jpg?v=20260622170114" alt="About SETRA">
          </div>
          <div>
            <div class="section-eyebrow" data-i18n="homeAboutEyebrow"></div>
            <h2 class="section-title" data-i18n="homeAboutTitle"></h2>
            <p class="section-desc" data-i18n="homeAboutDesc"></p>
            <div class="mt-3">
              <a href="about.html" class="btn btn-dark" data-i18n="homeAboutMore"></a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 产品分类卡片 -->
    <section class="section">
      <div class="section-inner">
        <div class="section-head">
          <div class="section-eyebrow" data-i18n="homeProductsEyebrow"></div>
          <h2 class="section-title" data-i18n="homeProductsTitle"></h2>
          <p class="section-desc" data-i18n="homeProductsDesc"></p>
        </div>
        <div class="products-services-section" style="background:transparent;box-shadow:none;padding:0;">
          <div class="products-services-content">
            <ul></ul>
          </div>
        </div>
        <div class="text-center mt-3">
          <a href="products.html" class="btn btn-primary" data-i18n="homeProductsMore"></a>
        </div>
      </div>
    </section>

    <!-- 我们的强项 -->
    <section class="section section-alt">
      <div class="section-inner">
        <div class="section-head">
          <div class="section-eyebrow" data-i18n="homeStrengthsEyebrow"></div>
          <h2 class="section-title" data-i18n="homeStrengthsTitle"></h2>
        </div>
        <ul class="strengths-grid" id="home-strengths-list"></ul>
      </div>
    </section>

    <!-- 统计数据 -->
    <section class="stats-section">
      <div class="section-inner">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-num">16<span class="suffix" data-i18n="statYearsSuffix"></span></div>
            <div class="stat-label" data-i18n="statYears"></div>
          </div>
          <div class="stat-card">
            <div class="stat-num">1000<span class="suffix" data-i18n="statClientsSuffix"></span></div>
            <div class="stat-label" data-i18n="statClients"></div>
          </div>
          <div class="stat-card">
            <div class="stat-num">100<span class="suffix" data-i18n="statQualitySuffix"></span></div>
            <div class="stat-label" data-i18n="statQuality"></div>
          </div>
          <div class="stat-card">
            <div class="stat-num">7<span class="suffix" data-i18n="statCountriesSuffix"></span></div>
            <div class="stat-label" data-i18n="statCountries"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- 公司简介 -->
    <section class="section">
      <div class="section-inner">
        <div class="section-head left">
          <div class="section-eyebrow" data-i18n="homeAboutEyebrow"></div>
          <h2 class="section-title" data-i18n="homeProfileTitle"></h2>
        </div>
        <div class="company-profile-section" style="background:transparent;box-shadow:none;padding:0;">
          <div class="company-profile-content">
            <p data-i18n="homeProfileContent"></p>
            <ul></ul>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- CTA 横幅 -->
  <section class="cta-banner">
    <div class="cta-banner-inner">
      <div>
        <h3 data-i18n="ctaTitle"></h3>
        <p data-i18n="ctaDesc"></p>
      </div>
      <a href="contact.html" class="btn btn-primary" data-i18n="ctaButton"></a>
    </div>
  </section>

  <script type="text/javascript">
    var pageName = 'index';
  </script>
  <script src="assets/js/data/lang.js?v=20260622170114"></script>
  <script src="assets/js/lib/headerFooterDomGenerator.js?v=20260622170114"></script>
  <script src="assets/js/lib/util.js?v=20260622170114"></script>
  <script src="assets/js/main.js?v=20260622170114"></script>
</body>

</html>
