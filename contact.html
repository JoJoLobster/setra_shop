<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我们 - 深圳市西特新环保材料有限公司</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .BMap_cpyCtrl
    {
    display:none;
    }
    .anchorBL{
      display:none;
    }
  </style>
</head>

<body>
  <main class="main-content">
    <section class="contact-section">
      <div class="contact-grid"></div>
      <div class="contact-map-info">
        <div id="map-container"></div>
      </div>
      <p class="contact-desc" data-i18n="contactDesc"></p>
    </section>
  </main>

  <section class="cta-banner">
    <div class="cta-banner-inner">
      <div>
        <h3 data-i18n="ctaTitle"></h3>
        <p data-i18n="ctaDesc"></p>
      </div>
      <a href="tel:+8675527782265" class="btn btn-primary" data-i18n="ctaButton"></a>
    </div>
  </section>

  <script type="text/javascript">
    var pageName = 'contact';
  </script>
  <script src="assets/js/data/lang.js"></script>
  <script src="assets/js/lib/headerFooterDomGenerator.js"></script>
  <script src="assets/js/contact.js"></script>
  <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=w3kWkfc6Xe3epBtrwBXMnHQW1R93h9N0&s=1"></script>
  <script type="text/javascript">
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof BMap === 'undefined') return;
      try {
        const map = new BMap.Map("map-container");
        map.centerAndZoom(new BMap.Point(12670472.00, 2588048.00), 11);
        const local = new BMap.LocalSearch(map, { renderOptions: { map: map } });
        local.search("西特新环保材料有限公司");
      } catch (e) { /* 地图加载失败时静默 */ }
    });
  </script>
</body>

</html>
